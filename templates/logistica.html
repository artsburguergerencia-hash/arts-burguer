<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística e Despacho - Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen flex flex-col overflow-hidden font-sans select-none">

    <!-- CABEÇALHO -->
    <header class="bg-slate-900 border-b border-slate-800 h-16 flex items-center justify-between px-6 shrink-0 shadow-lg z-10">
        <div class="flex items-center space-x-3">
            <div class="bg-purple-500/10 p-2 rounded-lg border border-purple-500/20">
                <i class="ph-fill ph-moped text-2xl text-purple-500"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight uppercase">Painel de Despacho (Logística)</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Controle de Entregas</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="buscarPedidosLogistica()" class="bg-slate-800 hover:bg-slate-700 text-white p-2 rounded-lg transition-colors" title="Atualizar Tela">
                <i class="ph ph-arrows-clockwise text-xl"></i>
            </button>
            <div id="relogio" class="text-xl font-bold tracking-wider text-slate-400">00:00:00</div>
        </div>
    </header>

    <!-- QUADRO KANBAN (2 COLUNAS) -->
    <main class="flex-1 overflow-hidden p-6 grid grid-cols-1 md:grid-cols-2 gap-6 bg-gradient-to-b from-slate-950 to-slate-900">
        
        <!-- COLUNA 1: PRONTOS (Aguardando Motoboy) -->
        <div class="flex flex-col bg-slate-900/50 rounded-3xl border border-slate-800 overflow-hidden">
            <div class="p-4 border-b border-slate-800 bg-slate-900 flex justify-between items-center shrink-0">
                <h2 class="font-black text-lg text-white uppercase tracking-wide flex items-center">
                    <i class="ph-fill ph-package mr-2 text-blue-400"></i> Prontos para Entrega
                </h2>
                <span id="contador-prontos" class="bg-blue-500/20 text-blue-400 font-bold px-3 py-1 rounded-full text-xs">0</span>
            </div>
            <div id="lista-prontos" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <!-- Pedidos Prontos entram aqui -->
                <div class="h-full flex flex-col items-center justify-center text-slate-600 opacity-50">
                    <i class="ph ph-check-circle text-5xl mb-2"></i>
                    <p class="text-sm font-bold">Nenhum pedido aguardando.</p>
                </div>
            </div>
        </div>

        <!-- COLUNA 2: EM ROTA -->
        <div class="flex flex-col bg-slate-900/50 rounded-3xl border border-slate-800 overflow-hidden">
            <div class="p-4 border-b border-slate-800 bg-slate-900 flex justify-between items-center shrink-0">
                <h2 class="font-black text-lg text-white uppercase tracking-wide flex items-center">
                    <i class="ph-fill ph-map-pin-line mr-2 text-purple-400"></i> Em Rota
                </h2>
                <span id="contador-rota" class="bg-purple-500/20 text-purple-400 font-bold px-3 py-1 rounded-full text-xs">0</span>
            </div>
            <div id="lista-rota" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar">
                <!-- Pedidos Em Rota entram aqui -->
                <div class="h-full flex flex-col items-center justify-center text-slate-600 opacity-50">
                    <i class="ph ph-motorcycle text-5xl mb-2"></i>
                    <p class="text-sm font-bold">Nenhum motoboy na rua.</p>
                </div>
            </div>
        </div>

    </main>

    <!-- MODAL DE DESPACHO -->
    <div id="modal-despacho" class="fixed inset-0 bg-slate-950/80 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-slate-900 w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl border border-slate-700">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                <h3 class="font-black text-white text-lg">Despachar Pedido #<span id="despacho-id"></span></h3>
                <button onclick="fecharModalDespacho()" class="text-slate-500 hover:text-white"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="p-5">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nome do Motoboy</label>
                <input type="text" id="nome-motoboy" placeholder="Ex: Carlos, João..." class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-purple-500 mb-4">
                
                <button onclick="confirmarDespacho()" id="btn-confirmar-despacho" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black py-4 rounded-xl shadow-[0_4px_12px_rgba(168,85,247,0.3)] transition-all active:scale-95 uppercase tracking-wide text-sm">
                    Liberar Entrega
                </button>
            </div>
        </div>
    </div>

    <script>
        let pedidoAtualId = null;

        // Atualiza relógio
        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // Busca pedidos a cada 5 segundos
        setInterval(buscarPedidosLogistica, 5000);
        document.addEventListener('DOMContentLoaded', buscarPedidosLogistica);

        async function buscarPedidosLogistica() {
            try {
                const res = await fetch('/api/logistica/pedidos');
                const dados = await res.json();
                
                document.getElementById('contador-prontos').innerText = dados.prontos.length;
                document.getElementById('contador-rota').innerText = dados.em_rota.length;

                renderizarLista('lista-prontos', dados.prontos, true);
                renderizarLista('lista-rota', dados.em_rota, false);
            } catch (e) {
                console.error("Erro ao buscar logística:", e);
            }
        }

        function renderizarLista(containerId, pedidos, isPronto) {
            const container = document.getElementById(containerId);
            
            if (pedidos.length === 0) {
                const icone = isPronto ? 'ph-check-circle' : 'ph-motorcycle';
                const texto = isPronto ? 'Nenhum pedido aguardando.' : 'Nenhum motoboy na rua.';
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-600 opacity-50">
                        <i class="ph ${icone} text-5xl mb-2"></i>
                        <p class="text-sm font-bold">${texto}</p>
                    </div>`;
                return;
            }

            container.innerHTML = pedidos.map(p => `
                <div class="bg-slate-800 border ${isPronto ? 'border-blue-500/30' : 'border-purple-500/30'} p-4 rounded-2xl shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full ${isPronto ? 'bg-blue-500' : 'bg-purple-500'}"></div>
                    
                    <div class="flex justify-between items-start mb-3 pl-2">
                        <div>
                            <h3 class="font-black text-xl text-white">#${p.id}</h3>
                            <p class="text-xs font-bold text-slate-400 mt-0.5"><i class="ph-fill ph-user mr-1"></i>${p.cliente}</p>
                        </div>
                        <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${isPronto ? 'bg-blue-500/10 text-blue-400' : 'bg-purple-500/10 text-purple-400'}">
                            ${isPronto ? 'Aguardando' : 'Na Rua'}
                        </span>
                    </div>

                    <div class="pl-2 mb-4">
                        <div class="bg-slate-900/50 rounded-lg p-3 border border-slate-700/50">
                            <p class="text-xs font-semibold text-slate-300 leading-relaxed flex items-start">
                                <i class="ph-fill ph-map-pin text-brand-500 mt-0.5 mr-2 text-sm shrink-0"></i> 
                                ${p.endereco}
                            </p>
                        </div>
                    </div>

                    ${isPronto ? `
                        <button onclick="abrirModalDespacho(${p.id})" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-95 uppercase tracking-wide text-xs">
                            <i class="ph-fill ph-motorcycle mr-1"></i> Despachar Agora
                        </button>
                    ` : `
                        <button disabled class="w-full bg-slate-700 text-slate-400 font-black py-3 rounded-xl uppercase tracking-wide text-xs cursor-not-allowed">
                            <i class="ph-fill ph-check-circle mr-1"></i> Entrega em Andamento
                        </button>
                    `}
                </div>
            `).join('');
        }

        function abrirModalDespacho(id) {
            pedidoAtualId = id;
            document.getElementById('despacho-id').innerText = id;
            document.getElementById('nome-motoboy').value = '';
            document.getElementById('modal-despacho').classList.remove('hidden');
            document.getElementById('modal-despacho').classList.add('flex');
            document.getElementById('nome-motoboy').focus();
        }

        function fecharModalDespacho() {
            document.getElementById('modal-despacho').classList.add('hidden');
            document.getElementById('modal-despacho').classList.remove('flex');
            pedidoAtualId = null;
        }

        async function confirmarDespacho() {
            const motoboy = document.getElementById('nome-motoboy').value.trim() || 'Motoboy Parceiro';
            const btn = document.getElementById('btn-confirmar-despacho');
            
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i>';
            btn.disabled = true;

            try {
                const res = await fetch(`/api/logistica/pedidos/${pedidoAtualId}/despachar`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome_motoboy: motoboy })
                });

                if (res.ok) {
                    fecharModalDespacho();
                    buscarPedidosLogistica();
                } else {
                    alert("Erro ao despachar o pedido.");
                }
            } catch (error) {
                alert("Erro de conexão.");
            } finally {
                btn.innerHTML = 'Liberar Entrega';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
