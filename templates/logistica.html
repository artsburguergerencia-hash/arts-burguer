<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Logística - Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 500: '#ff4757', 600: '#e04050' } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen w-screen flex flex-col overflow-hidden font-sans">
    
    <!-- CABEÇALHO -->
    <header class="bg-slate-900 border-b border-slate-800 h-16 flex items-center justify-between px-6 shrink-0 shadow-lg text-white z-20">
        <div class="flex items-center space-x-3">
            <div class="bg-brand-500/20 p-2 rounded-lg border border-brand-500/30">
                <i class="ph-fill ph-moped text-2xl text-brand-500 animate-bounce"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight uppercase leading-none">Base de Logística</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Controle de Entregas</p>
            </div>
        </div>
        <button onclick="window.location.replace('/admin')" class="text-slate-400 hover:text-white transition-colors">
            <i class="ph ph-sign-out text-2xl"></i>
        </button>
    </header>

    <!-- ÁREA DE COLUNAS -->
    <main class="flex-1 overflow-hidden p-4 md:p-6 flex flex-col md:flex-row gap-4 md:gap-6">
        
        <!-- Coluna 1: Pacotes Prontos (Aguardando Motoboy) -->
        <section class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <header class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="font-black text-slate-700 flex items-center text-lg tracking-tight">
                    <i class="ph-fill ph-package mr-2 text-blue-500"></i> Aguardando Retirada
                </h2>
            </header>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar bg-slate-50/50" id="lista-prontos">
                <div class="h-full flex flex-col justify-center items-center text-slate-400">
                    <i class="ph ph-spinner animate-spin text-4xl mb-2"></i>
                    <p class="text-sm font-medium">Buscando pacotes...</p>
                </div>
            </div>
        </section>

        <!-- Coluna 2: Motoboys na Rua (Em Rota) -->
        <section class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <header class="p-4 border-b border-slate-100 bg-slate-50">
                <h2 class="font-black text-slate-700 flex items-center text-lg tracking-tight">
                    <i class="ph-fill ph-motorcycle mr-2 text-purple-500"></i> Em Rota de Entrega
                </h2>
            </header>
            <div class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar bg-slate-50/50" id="lista-rota">
                <div class="h-full flex flex-col justify-center items-center text-slate-400">
                    <i class="ph ph-spinner animate-spin text-4xl mb-2"></i>
                    <p class="text-sm font-medium">Buscando pacotes...</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ==========================
        // MOTOR DE LOGÍSTICA
        // ==========================
        async function carregarLogistica() {
            try {
                const res = await fetch('/api/logistica/pedidos');
                const data = await res.json();
                
                renderizarProntos(data.prontos);
                renderizarEmRota(data.em_rota);
            } catch(e) { console.error("Erro ao carregar dados", e); }
        }

        function renderizarProntos(pedidos) {
            const div = document.getElementById('lista-prontos');
            if(pedidos.length === 0) {
                div.innerHTML = '<div class="h-full flex flex-col justify-center items-center text-slate-300"><i class="ph-fill ph-check-circle text-6xl mb-2"></i><p class="font-medium text-sm">Nenhum pedido aguardando.</p></div>';
                return;
            }
            
            div.innerHTML = pedidos.map(p => `
                <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden">
                    <div class="absolute left-0 top-0 w-1 h-full bg-blue-500"></div>
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-black text-xl text-slate-800 tracking-tight">#${p.id} - ${p.cliente.split(' ')[0]}</h3>
                        <span class="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded uppercase tracking-wider">${p.tipo}</span>
                    </div>
                    ${p.tipo === 'DELIVERY' ? `<p class="text-xs font-semibold text-slate-500 mb-4 flex items-start leading-relaxed"><i class="ph-fill ph-map-pin text-brand-500 mr-1.5 mt-0.5 text-base"></i> ${p.endereco}</p>` : `<p class="text-xs text-amber-600 bg-amber-50 px-2 py-1 inline-block rounded font-bold mb-4">📍 RETIRADA NO BALCÃO</p>`}
                    
                    <button onclick="despacharPedido(${p.id}, '${p.tipo}')" class="w-full bg-slate-900 hover:bg-brand-500 text-white font-black py-3.5 rounded-lg text-sm transition-colors shadow-lg active:scale-95 uppercase tracking-wider">
                        ${p.tipo === 'DELIVERY' ? 'Entregar ao Motoboy' : 'Entregar ao Cliente'}
                    </button>
                </div>
            `).join('');
        }

        function renderizarEmRota(pedidos) {
            const div = document.getElementById('lista-rota');
            if(pedidos.length === 0) {
                div.innerHTML = '<div class="h-full flex flex-col justify-center items-center text-slate-300"><i class="ph-fill ph-motorcycle text-6xl mb-2"></i><p class="font-medium text-sm">Nenhum motoboy na rua.</p></div>';
                return;
            }
            
            div.innerHTML = pedidos.map(p => `
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-lg relative overflow-hidden text-white">
                    <div class="absolute left-0 top-0 w-1 h-full bg-purple-500"></div>
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-black text-xl tracking-tight">#${p.id} - ${p.cliente.split(' ')[0]}</h3>
                    </div>
                    <p class="text-xs text-slate-300 font-medium mb-4 flex items-start leading-relaxed"><i class="ph-fill ph-map-pin text-purple-400 mr-1.5 mt-0.5 text-base"></i> ${p.endereco}</p>
                    
                    <div class="flex space-x-2">
                        <button onclick="abrirGPS('${p.endereco}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3.5 rounded-lg text-sm transition-colors shadow-sm flex justify-center items-center active:scale-95 border border-slate-600">
                            <i class="ph-fill ph-navigation-arrow mr-2 text-blue-400 text-lg"></i> GPS
                        </button>
                        <button onclick="marcarEntregue(${p.id})" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 rounded-lg text-sm transition-colors shadow-sm flex justify-center items-center active:scale-95">
                            <i class="ph-fill ph-check-circle mr-2 text-lg"></i> Entregue
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function despacharPedido(id, tipo) {
            // Se for retirada no balcão, pula a viagem de moto e finaliza a venda imediatamente!
            if(tipo === 'RETIRADA') {
                marcarEntregue(id);
                return;
            }
            
            try {
                const res = await fetch(`/api/logistica/pedidos/${id}/despachar`, {
                    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ nome_motoboy: "Motoboy Express" })
                });
                if(res.ok) carregarLogistica();
            } catch(e) { console.error(e); }
        }

        async function marcarEntregue(id) {
            try {
                const res = await fetch(`/api/logistica/pedidos/${id}/entregar`, { method: 'PUT' });
                if(res.ok) {
                    alert("✅ Venda Finalizada! O sistema enviou uma mensagem de agradecimento pelo WhatsApp.");
                    carregarLogistica();
                }
            } catch(e) { console.error(e); }
        }

        // ==========================
        // BOTÃO MÁGICO DO WAZE/MAPS
        // ==========================
        function abrirGPS(endereco) {
            if(!endereco || endereco.includes('Retirada')) return alert("Endereço inválido para GPS.");
            // Essa URL universal converte o texto para o formato de busca do Google Maps no app do celular
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(endereco)}`;
            window.open(url, '_blank');
        }

        // Atualiza a tela sozinho a cada 5 segundos
        setInterval(carregarLogistica, 5000);
        document.addEventListener('DOMContentLoaded', carregarLogistica);
    </script>
</body>
</html>
