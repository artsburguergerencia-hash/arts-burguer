<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 500: '#ff4757', 600: '#e04050' } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- LADO ESQUERDO: CARDÁPIO -->
    <div class="flex-1 flex flex-col h-full bg-slate-50">
        <header class="bg-white border-b border-slate-200 p-4 shadow-sm flex justify-between items-center shrink-0">
            <h1 class="text-xl font-black text-slate-800 tracking-tight flex items-center">
                <i class="ph-fill ph-storefront text-brand-500 mr-2 text-2xl"></i> PDV Caixa
            </h1>
            <div class="relative w-64">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="busca-produto" placeholder="Buscar produto..." onkeyup="filtrarProdutos()" class="w-full pl-10 pr-4 py-2 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-medium">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
            <div id="grid-produtos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <div class="col-span-full text-center py-10 text-slate-400">
                    <i class="ph ph-spinner animate-spin text-4xl mb-2"></i>
                    <p>Carregando cardápio...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- LADO DIREITO: CARRINHO E CHECKOUT -->
    <div class="w-96 bg-white border-l border-slate-200 flex flex-col h-full shadow-2xl shrink-0 z-10">
        <!-- Busca de Cliente -->
        <div class="p-4 border-b border-slate-200 bg-slate-50">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">Cliente (Opcional)</label>
            <div class="flex space-x-2">
                <input type="tel" id="pdv-tel" placeholder="Telefone" class="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm">
                <button onclick="buscarClientePDV()" class="bg-slate-800 hover:bg-slate-700 text-white px-3 py-2 rounded-lg transition-colors"><i class="ph ph-magnifying-glass"></i></button>
            </div>
            <input type="text" id="pdv-nome" placeholder="Nome do Cliente" class="w-full mt-2 px-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-brand-500 text-sm hidden">
            
            <!-- Painel VIP do Cliente no PDV -->
            <div id="painel-fidelidade" class="mt-3 p-3 bg-brand-50 border border-brand-100 rounded-lg hidden">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-brand-600 uppercase">Fidelidade</span>
                    <span id="pdv-status-cliente" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700">ATIVO</span>
                </div>
                <label class="flex items-center text-sm font-semibold text-slate-700 cursor-pointer mb-2">
                    <input type="checkbox" id="pdv-usar-pontos" onchange="atualizarTotais()" class="w-4 h-4 text-brand-500 rounded border-slate-300 mr-2">
                    Usar 10 Pontos (Tem: <span id="pdv-pts-disp">0</span>)
                </label>
                <div class="flex items-center justify-between text-sm font-semibold text-slate-700">
                    <span>Usar Cashback (R$ <span id="pdv-cash-disp">0,00</span>)</span>
                    <input type="number" id="pdv-usar-cash" value="0" min="0" step="0.01" onchange="atualizarTotais()" class="w-20 px-2 py-1 bg-white border border-slate-200 rounded text-right">
                </div>
            </div>
        </div>

        <!-- Itens do Carrinho -->
        <div class="flex-1 overflow-y-auto p-4 no-scrollbar bg-white" id="pdv-carrinho">
            <div class="h-full flex flex-col items-center justify-center text-slate-300">
                <i class="ph-fill ph-shopping-cart text-6xl mb-2"></i>
                <p class="font-medium text-sm">Carrinho vazio</p>
            </div>
        </div>

        <!-- Resumo e Finalização -->
        <div class="p-4 border-t border-slate-200 bg-slate-50">
            <div class="space-y-1 mb-4 text-sm font-medium text-slate-600">
                <div class="flex justify-between"><span>Subtotal:</span> <span id="pdv-subtotal">R$ 0,00</span></div>
                <div class="flex justify-between text-brand-500 hidden" id="linha-desc-cash"><span>Desc. Cashback:</span> <span id="pdv-desc-cash">- R$ 0,00</span></div>
                <div class="flex justify-between text-amber-500 hidden" id="linha-desc-pts"><span>Desc. Pontos:</span> <span>Recompensa Resgatada!</span></div>
            </div>
            
            <div class="flex justify-between items-end mb-4">
                <span class="text-sm font-bold text-slate-500 uppercase">Total</span>
                <span class="text-3xl font-black text-slate-800 tracking-tight" id="pdv-total-final">R$ 0,00</span>
            </div>

            <select id="pdv-forma-pag" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-slate-800 text-sm font-bold mb-3 shadow-sm cursor-pointer">
                <option value="dinheiro">💵 Dinheiro</option>
                <option value="cartao_credito">💳 Cartão de Crédito</option>
                <option value="cartao_debito">💳 Cartão de Débito</option>
                <option value="pix">⚡ Pix</option>
            </select>

            <button onclick="finalizarVendaPDV()" id="btn-finalizar-pdv" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-black text-lg py-4 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center">
                Cobrar Pedido
            </button>
        </div>
    </div>

    <script>
        let produtosServer = [];
        let carrinhoPDV = [];
        let dadosClienteVip = null;

        document.addEventListener('DOMContentLoaded', carregarCardapioPDV);

        async function carregarCardapioPDV() {
            try {
                const res = await fetch('/api/cardapio');
                produtosServer = await res.json();
                renderizarProdutosPDV(produtosServer);
            } catch (e) {
                document.getElementById('grid-produtos').innerHTML = '<p class="text-red-500 col-span-full text-center py-4 font-bold">Erro ao carregar cardápio.</p>';
            }
        }

        function renderizarProdutosPDV(lista) {
            const grid = document.getElementById('grid-produtos');
            if(lista.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-400 py-10">Nenhum produto encontrado.</p>';
                return;
            }
            grid.innerHTML = lista.map(p => `
                <div onclick="addCarrinhoPDV(${p.id})" class="bg-white rounded-2xl border border-slate-100 p-3 shadow-sm hover:shadow-md cursor-pointer transition-all active:scale-95 flex flex-col justify-between h-36">
                    <div>
                        <span class="text-[9px] font-bold uppercase tracking-wider text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">${p.categoria}</span>
                        <h3 class="font-bold text-slate-800 mt-2 leading-tight text-sm line-clamp-2">${p.nome}</h3>
                    </div>
                    <div class="font-black text-brand-500 text-lg">R$ ${p.preco_venda.toFixed(2).replace('.', ',')}</div>
                </div>
            `).join('');
        }

        function filtrarProdutos() {
            const termo = document.getElementById('busca-produto').value.toLowerCase();
            const filtrados = produtosServer.filter(p => p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo));
            renderizarProdutosPDV(filtrados);
        }

        function addCarrinhoPDV(id) {
            const produto = produtosServer.find(p => p.id === id);
            const itemExistente = carrinhoPDV.find(i => i.produto_id === id);
            
            if(itemExistente) {
                itemExistente.quantidade++;
            } else {
                carrinhoPDV.push({ produto_id: produto.id, nome: produto.nome, preco: produto.preco_venda, quantidade: 1, observacao: "" });
            }
            renderizarCarrinhoPDV();
        }

        function alterarQtd(index, delta) {
            carrinhoPDV[index].quantidade += delta;
            if(carrinhoPDV[index].quantidade <= 0) carrinhoPDV.splice(index, 1);
            renderizarCarrinhoPDV();
        }

        function addObs(index) {
            const obsAtual = carrinhoPDV[index].observacao;
            const novaObs = prompt(`Observação para: ${carrinhoPDV[index].nome}`, obsAtual);
            if(novaObs !== null) {
                carrinhoPDV[index].observacao = novaObs;
                renderizarCarrinhoPDV();
            }
        }

        function renderizarCarrinhoPDV() {
            const container = document.getElementById('pdv-carrinho');
            
            if(carrinhoPDV.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300"><i class="ph-fill ph-shopping-cart text-6xl mb-2"></i><p class="font-medium text-sm">Carrinho vazio</p></div>`;
                atualizarTotais();
                return;
            }

            container.innerHTML = carrinhoPDV.map((item, index) => `
                <div class="bg-white border-b border-slate-100 py-3 flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-slate-800 text-sm leading-tight">${item.nome}</h4>
                            <p class="font-bold text-brand-500 text-xs mt-0.5">R$ ${(item.preco * item.quantidade).toFixed(2).replace('.', ',')}</p>
                        </div>
                        <button onclick="addObs(${index})" class="text-slate-400 hover:text-amber-500 transition-colors"><i class="ph-fill ph-chat-teardrop-text text-lg"></i></button>
                    </div>
                    ${item.observacao ? `<p class="text-[10px] text-amber-600 bg-amber-50 px-2 py-1 rounded mb-2 font-semibold">⚠️ ${item.observacao}</p>` : ''}
                    <div class="flex items-center justify-between mt-auto">
                        <div class="flex items-center bg-slate-100 rounded-lg p-0.5">
                            <button onclick="alterarQtd(${index}, -1)" class="w-7 h-7 bg-white rounded-md shadow-sm font-bold text-slate-600 flex items-center justify-center hover:bg-slate-50">-</button>
                            <span class="w-8 text-center font-bold text-sm text-slate-800">${item.quantidade}</span>
                            <button onclick="alterarQtd(${index}, 1)" class="w-7 h-7 bg-white rounded-md shadow-sm font-bold text-slate-600 flex items-center justify-center hover:bg-slate-50">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            atualizarTotais();
        }

        async function buscarClientePDV() {
            const telInput = document.getElementById('pdv-tel');
            const tel = telInput.value.replace(/\D/g, '');
            const nomeInput = document.getElementById('pdv-nome');
            const painelFid = document.getElementById('painel-fidelidade');

            if(tel.length < 10) return alert("Digite um telefone válido.");

            try {
                const res = await fetch(`/api/pdv/cliente/${tel}`);
                if(res.ok) {
                    dadosClienteVip = await res.json();
                    if(dadosClienteVip.bloqueado) {
                        alert("⚠️ ATENÇÃO: Este cliente está bloqueado no sistema!");
                        document.getElementById('pdv-status-cliente').className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700";
                        document.getElementById('pdv-status-cliente').innerText = "BLOQUEADO";
                    } else {
                        document.getElementById('pdv-status-cliente').className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700";
                        document.getElementById('pdv-status-cliente').innerText = "ATIVO";
                    }
                    nomeInput.value = dadosClienteVip.nome;
                    nomeInput.classList.remove('hidden');
                    painelFid.classList.remove('hidden');
                    
                    document.getElementById('pdv-pts-disp').innerText = dadosClienteVip.pontos;
                    document.getElementById('pdv-cash-disp').innerText = dadosClienteVip.cashback.toFixed(2).replace('.', ',');
                    document.getElementById('pdv-usar-cash').max = dadosClienteVip.cashback;
                    document.getElementById('pdv-usar-cash').value = 0;
                    document.getElementById('pdv-usar-pontos').checked = false;
                    
                    // Desabilita checkbox se não tiver pontos suficientes
                    document.getElementById('pdv-usar-pontos').disabled = dadosClienteVip.pontos < 10;
                } else {
                    dadosClienteVip = null;
                    painelFid.classList.add('hidden');
                    nomeInput.classList.remove('hidden');
                    nomeInput.value = "";
                    nomeInput.focus();
                    alert("Cliente novo! Digite o nome dele para registrar a venda.");
                }
            } catch(e) {
                alert("Erro ao buscar cliente.");
            }
            atualizarTotais();
        }

        function atualizarTotais() {
            let subtotal = carrinhoPDV.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
            let cashbackUsado = 0;
            let pontosUsados = false;

            document.getElementById('pdv-subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;

            if(dadosClienteVip && carrinhoPDV.length > 0) {
                cashbackUsado = parseFloat(document.getElementById('pdv-usar-cash').value) || 0;
                if(cashbackUsado > dadosClienteVip.cashback) cashbackUsado = dadosClienteVip.cashback;
                if(cashbackUsado > subtotal) cashbackUsado = subtotal; // Não deixa dar troco negativo
                
                pontosUsados = document.getElementById('pdv-usar-pontos').checked;
            }

            // Exibição visual dos descontos
            const linhaCash = document.getElementById('linha-desc-cash');
            const linhaPts = document.getElementById('linha-desc-pts');
            
            if(cashbackUsado > 0) {
                linhaCash.classList.remove('hidden');
                document.getElementById('pdv-desc-cash').innerText = `- R$ ${cashbackUsado.toFixed(2).replace('.', ',')}`;
            } else { linhaCash.classList.add('hidden'); }
            
            pontosUsados ? linhaPts.classList.remove('hidden') : linhaPts.classList.add('hidden');

            let totalFinal = subtotal - cashbackUsado;
            document.getElementById('pdv-total-final').innerText = `R$ ${totalFinal.toFixed(2).replace('.', ',')}`;
        }

        async function finalizarVendaPDV() {
            if(carrinhoPDV.length === 0) return alert("Carrinho vazio!");

            let telefone = document.getElementById('pdv-tel').value.replace(/\D/g, '') || "BALCAO";
            let nome = document.getElementById('pdv-nome').value || "Consumidor Final";
            let formaPag = document.getElementById('pdv-forma-pag').value;
            
            let usarCashback = 0;
            let usarPontos = false;

            if(dadosClienteVip) {
                usarCashback = parseFloat(document.getElementById('pdv-usar-cash').value) || 0;
                usarPontos = document.getElementById('pdv-usar-pontos').checked;
            }

            const payload = {
                nome_cliente: nome,
                telefone_cliente: telefone,
                forma_pagamento: formaPag,
                itens: carrinhoPDV.map(i => ({ produto_id: i.produto_id, quantidade: i.quantidade, observacao: i.observacao })),
                usar_saldo_cashback: usarCashback,
                usar_pontos: usarPontos
            };

            const btn = document.getElementById('btn-finalizar-pdv');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin text-2xl"></i> Processando...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/pedidos/pdv', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if(res.ok) {
                    alert(`✅ Venda Concluída! Pedido #${data.pedido_id} enviado para a cozinha.`);
                    // Limpar PDV para próxima venda
                    carrinhoPDV = [];
                    dadosClienteVip = null;
                    document.getElementById('pdv-tel').value = "";
                    document.getElementById('pdv-nome').value = "";
                    document.getElementById('pdv-nome').classList.add('hidden');
                    document.getElementById('painel-fidelidade').classList.add('hidden');
                    document.getElementById('pdv-usar-cash').value = 0;
                    document.getElementById('pdv-usar-pontos').checked = false;
                    renderizarCarrinhoPDV();
                } else {
                    alert(`Erro: ${data.detail}`);
                }
            } catch(e) {
                alert("Falha de conexão com o servidor.");
            } finally {
                btn.innerHTML = 'Cobrar Pedido';
                btn.disabled = false;
            }
        }

        // ==========================
        // MOTOR DE IMPRESSÃO TÉRMICA
        // ==========================
        async function imprimirCupom(pedidoId) {
            try {
                // 1. Busca os dados prontos no Backend
                const res = await fetch(`/api/pedidos/${pedidoId}/recibo`);
                const dados = await res.json();
                
                if (!res.ok) { alert("Erro: " + dados.detail); return; }

                // 2. Monta as linhas dos lanches
                let itensHtml = dados.itens.map(i => `
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 2px;">
                        <span style="font-weight: bold;">${i.quantidade}x ${i.nome}</span>
                        <span>R$ ${i.subtotal.toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${i.observacao ? `<div style="font-size: 11px; margin-bottom: 6px; padding-left: 10px; text-transform: uppercase;">-> OBS: ${i.observacao}</div>` : ''}
                `).join('');

                // 3. Desenha o Cupom no padrão Bobina 80mm
                const conteudoCupom = `
                    <html>
                    <head>
                        <title>Comanda #${dados.id}</title>
                        <style>
                            @page { margin: 0; }
                            body { font-family: 'Courier New', Courier, monospace; width: 75mm; margin: 0 auto; padding: 10px; color: #000; background: #fff; }
                            .text-center { text-align: center; }
                            .font-bold { font-weight: bold; }
                            .text-lg { font-size: 20px; }
                            .text-sm { font-size: 13px; }
                            .divisor { border-bottom: 1px dashed #000; margin: 10px 0; }
                        </style>
                    </head>
                    <body>
                        <div class="text-center font-bold text-lg mb-2">ART'S BURGUER</div>
                        <div class="text-center text-sm">Pedido #${dados.id}</div>
                        <div class="text-center text-sm" style="margin-bottom: 10px;">${dados.data_hora}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold">Cliente: ${dados.cliente_nome}</div>
                        <div class="text-sm font-bold">Tel: ${dados.cliente_telefone}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold text-center" style="font-size: 16px;">TIPO: ${dados.tipo}</div>
                        ${dados.tipo === 'DELIVERY' ? `<div class="text-sm" style="margin-top: 5px; text-transform: uppercase;"><b>End:</b> ${dados.endereco}</div>` : ''}
                        <div class="divisor"></div>
                        
                        <div class="font-bold text-center mb-2" style="font-size: 14px;">ITENS DO PEDIDO</div>
                        ${itensHtml}
                        
                        <div class="divisor"></div>
                        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
                            <span>TOTAL:</span>
                            <span>R$ ${dados.total.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div class="text-sm mt-2" style="text-transform: uppercase;"><b>PAGAMENTO:</b> ${dados.forma_pagamento}</div>
                        <div class="divisor"></div>
                        
                        <div class="text-center text-sm mt-4">Obrigado pela preferencia!</div>
                        <div class="text-center text-sm mt-1" style="margin-bottom: 20px;">.</div>
                    </body>
                    </html>
                `;

                // 4. Abre uma janela invisível, imprime e fecha sozinha!
                const janelaImpressao = window.open('', '', 'width=400,height=600');
                janelaImpressao.document.write(conteudoCupom);
                janelaImpressao.document.close();
                janelaImpressao.focus();
                
                // Dá 500ms pro navegador renderizar antes de chamar a caixa de impressão do Windows
                setTimeout(() => {
                    janelaImpressao.print();
                    janelaImpressao.close();
                }, 500);

            } catch(e) {
                alert("Falha de conexão com a impressora.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
