<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV - Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 500: '#ff4757', 600: '#e04050' } } } } }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .aba-conteudo { display: none; }
        .aba-conteudo.active { display: flex; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans h-screen flex overflow-hidden">

    <!-- MENU LATERAL MINIMALISTA -->
    <div class="w-20 bg-slate-900 flex flex-col items-center py-6 shrink-0 shadow-2xl z-20">
        <div class="w-12 h-12 bg-brand-500 rounded-xl flex items-center justify-center text-white mb-8 shadow-lg">
            <i class="ph-fill ph-hamburger text-2xl"></i>
        </div>
        
        <div class="flex flex-col space-y-4 w-full px-2">
            <button onclick="trocarAbaPDV('aba-nova-venda', this)" class="btn-aba w-full h-14 rounded-xl flex items-center justify-center text-white bg-slate-800 transition-all shadow-inner" title="Frente de Caixa (Nova Venda)">
                <i class="ph-fill ph-monitor text-2xl"></i>
            </button>
            <button onclick="trocarAbaPDV('aba-pedidos', this)" class="btn-aba w-full h-14 rounded-xl flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all" title="Gerenciar Pedidos & Imprimir">
                <i class="ph-fill ph-receipt text-2xl"></i>
            </button>
        </div>
        
        <button onclick="window.location.replace('/admin')" class="mt-auto w-12 h-12 rounded-xl flex items-center justify-center text-slate-400 hover:text-white hover:bg-slate-800 transition-all" title="Voltar ao ERP">
            <i class="ph ph-sign-out text-2xl"></i>
        </button>
    </div>

    <!-- ÁREA CENTRAL DO SISTEMA -->
    <div class="flex-1 flex flex-col h-full bg-slate-50 overflow-hidden relative">
        
        <!-- ========================================== -->
        <!-- ABA 1: FRENTE DE CAIXA (NOVA VENDA)        -->
        <!-- ========================================== -->
        <div id="aba-nova-venda" class="aba-conteudo active w-full h-full">
            <!-- LADO ESQUERDO: CARDÁPIO -->
            <div class="flex-1 flex flex-col h-full">
                <header class="bg-white border-b border-slate-200 p-4 shadow-sm flex justify-between items-center shrink-0">
                    <h1 class="text-xl font-black text-slate-800 tracking-tight flex items-center">
                        PDV <span class="text-brand-500 ml-2">Balcão</span>
                    </h1>
                    <div class="relative w-72">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="busca-produto" placeholder="Buscar no cardápio..." onkeyup="filtrarProdutos()" class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-slate-200 rounded-xl focus:ring-2 focus:ring-brand-500 outline-none text-sm font-semibold">
                    </div>
                </header>

                <div class="flex-1 overflow-y-auto p-4 no-scrollbar">
                    <div id="grid-produtos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        <div class="col-span-full text-center py-10 text-slate-400">
                            <i class="ph ph-spinner animate-spin text-4xl mb-2"></i>
                            <p>Carregando cardápio...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LADO DIREITO: CARRINHO E CHECKOUT -->
            <div class="w-96 bg-white border-l border-slate-200 flex flex-col h-full shadow-2xl shrink-0 z-10">
                <!-- Busca de Cliente -->
                <div class="p-4 border-b border-slate-200 bg-slate-50">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 block">Identificar Cliente</label>
                    <div class="flex space-x-2">
                        <input type="tel" id="pdv-tel" placeholder="Telefone (Opcional)" class="flex-1 px-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 text-sm">
                        <button onclick="buscarClientePDV()" class="bg-slate-800 hover:bg-slate-700 text-white px-3 py-2 rounded-lg transition-colors"><i class="ph ph-magnifying-glass"></i></button>
                    </div>
                    <input type="text" id="pdv-nome" placeholder="Nome do Cliente" class="w-full mt-2 px-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-brand-500 text-sm hidden">
                    
                    <!-- Painel VIP do Cliente no PDV -->
                    <div id="painel-fidelidade" class="mt-3 p-3 bg-brand-50 border border-brand-100 rounded-lg hidden">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs font-bold text-brand-600 uppercase">Programa VIP</span>
                            <span id="pdv-status-cliente" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700">ATIVO</span>
                        </div>
                        <label class="flex items-center text-sm font-semibold text-slate-700 cursor-pointer mb-2">
                            <input type="checkbox" id="pdv-usar-pontos" onchange="atualizarTotais()" class="w-4 h-4 text-brand-500 rounded border-slate-300 mr-2">
                            Resgatar Brinde (Tem: <span id="pdv-pts-disp">0</span> pts)
                        </label>
                        <div class="flex items-center justify-between text-sm font-semibold text-slate-700">
                            <span>Cashback (R$ <span id="pdv-cash-disp">0,00</span>)</span>
                            <input type="number" id="pdv-usar-cash" value="0" min="0" step="0.01" onchange="atualizarTotais()" class="w-20 px-2 py-1 bg-white border border-slate-200 rounded text-right">
                        </div>
                    </div>
                </div>

                <!-- Itens do Carrinho -->
                <div class="flex-1 overflow-y-auto p-4 no-scrollbar bg-white" id="pdv-carrinho">
                    <div class="h-full flex flex-col items-center justify-center text-slate-300">
                        <i class="ph-fill ph-shopping-cart text-6xl mb-2"></i>
                        <p class="font-medium text-sm">Aguardando itens...</p>
                    </div>
                </div>

                <!-- Resumo e Finalização -->
                <div class="p-4 border-t border-slate-200 bg-slate-50">
                    <div class="space-y-1 mb-4 text-sm font-medium text-slate-600">
                        <div class="flex justify-between"><span>Subtotal:</span> <span id="pdv-subtotal">R$ 0,00</span></div>
                        <div class="flex justify-between text-brand-500 hidden" id="linha-desc-cash"><span>Cashback:</span> <span id="pdv-desc-cash">- R$ 0,00</span></div>
                        <div class="flex justify-between text-amber-500 hidden" id="linha-desc-pts"><span>Brinde:</span> <span>Ativado!</span></div>
                    </div>
                    
                    <div class="flex justify-between items-end mb-4">
                        <span class="text-sm font-bold text-slate-500 uppercase">Total a Pagar</span>
                        <span class="text-3xl font-black text-slate-800 tracking-tight" id="pdv-total-final">R$ 0,00</span>
                    </div>

                    <select id="pdv-forma-pag" class="w-full px-4 py-3 bg-white border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-slate-800 text-sm font-bold mb-3 shadow-sm cursor-pointer">
                        <option value="dinheiro">💵 Dinheiro Espécie</option>
                        <option value="cartao_credito">💳 Cartão de Crédito</option>
                        <option value="cartao_debito">💳 Cartão de Débito</option>
                        <option value="pix">⚡ Pix Balcão</option>
                    </select>

                    <button onclick="finalizarVendaPDV()" id="btn-finalizar-pdv" class="w-full bg-slate-900 hover:bg-brand-500 text-white font-black text-lg py-4 rounded-xl shadow-lg transition-all active:scale-95 flex justify-center items-center">
                        <i class="ph-fill ph-check-circle mr-2 text-2xl"></i> Concluir Venda
                    </button>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- ABA 2: GERENCIAR PEDIDOS & IMPRIMIR CUPOM  -->
        <!-- ========================================== -->
        <div id="aba-pedidos" class="aba-conteudo flex-col w-full h-full bg-slate-50">
            <header class="bg-white border-b border-slate-200 p-4 shadow-sm shrink-0 flex justify-between items-center">
                <h1 class="text-xl font-black text-slate-800 tracking-tight flex items-center">
                    Gerenciador de <span class="text-brand-500 ml-2">Comandas</span>
                </h1>
                <button onclick="carregarListaPedidosPDV()" class="text-sm font-bold text-slate-500 hover:text-slate-800 flex items-center bg-slate-100 px-3 py-1.5 rounded-lg transition-colors">
                    <i class="ph-fill ph-arrows-clockwise mr-2"></i> Atualizar Lista
                </button>
            </header>
            
            <div class="flex-1 p-6 overflow-y-auto no-scrollbar">
                <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500 font-bold">
                                <th class="py-4 px-6">ID</th>
                                <th class="py-4 px-6">Cliente</th>
                                <th class="py-4 px-6">Tipo / Pagamento</th>
                                <th class="py-4 px-6 font-bold text-slate-800">Total</th>
                                <th class="py-4 px-6">Status atual</th>
                                <th class="py-4 px-6 text-center">Ações / Impressão</th>
                            </tr>
                        </thead>
                        <tbody id="lista-pedidos-pdv" class="text-sm">
                            <tr><td colspan="6" class="text-center py-10 text-slate-400">Buscando pedidos recentes...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==========================
        // LÓGICA DE NAVEGAÇÃO DE ABAS
        // ==========================
        function trocarAbaPDV(idAba, btnClicado) {
            document.querySelectorAll('.aba-conteudo').forEach(aba => aba.classList.remove('active'));
            document.querySelectorAll('.btn-aba').forEach(btn => {
                btn.classList.remove('bg-slate-800', 'text-white', 'shadow-inner');
                btn.classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
            });
            
            document.getElementById(idAba).classList.add('active');
            btnClicado.classList.add('bg-slate-800', 'text-white', 'shadow-inner');
            btnClicado.classList.remove('text-slate-400');

            if (idAba === 'aba-pedidos') { carregarListaPedidosPDV(); }
        }

        // ==========================
        // MOTOR DO PDV E CARRINHO
        // ==========================
        let produtosServer = [];
        let carrinhoPDV = [];
        let dadosClienteVip = null;

        document.addEventListener('DOMContentLoaded', carregarCardapioPDV);

        async function carregarCardapioPDV() {
            try {
                const res = await fetch('/api/cardapio');
                produtosServer = await res.json();
                renderizarProdutosPDV(produtosServer);
            } catch (e) {
                document.getElementById('grid-produtos').innerHTML = '<p class="col-span-full text-center text-red-500 font-bold">Erro de conexão com o servidor.</p>';
            }
        }

        function renderizarProdutosPDV(lista) {
            const grid = document.getElementById('grid-produtos');
            if(lista.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-400 py-10">Produto não encontrado.</p>';
                return;
            }
            grid.innerHTML = lista.map(p => `
                <div onclick="addCarrinhoPDV(${p.id})" class="bg-white rounded-2xl border border-slate-200 p-3 shadow-sm hover:border-brand-500 hover:shadow-md cursor-pointer transition-all active:scale-95 flex flex-col justify-between h-36 relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-1 h-full bg-slate-200 group-hover:bg-brand-500 transition-colors"></div>
                    <div class="pl-2">
                        <span class="text-[9px] font-bold uppercase tracking-wider text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">${p.categoria}</span>
                        <h3 class="font-bold text-slate-800 mt-2 leading-tight text-sm">${p.nome}</h3>
                    </div>
                    <div class="font-black text-brand-500 text-lg pl-2">R$ ${p.preco_venda.toFixed(2).replace('.', ',')}</div>
                </div>
            `).join('');
        }

        function filtrarProdutos() {
            const termo = document.getElementById('busca-produto').value.toLowerCase();
            const filtrados = produtosServer.filter(p => p.nome.toLowerCase().includes(termo) || p.categoria.toLowerCase().includes(termo));
            renderizarProdutosPDV(filtrados);
        }

        function addCarrinhoPDV(id) {
            const produto = produtosServer.find(p => p.id === id);
            const itemExistente = carrinhoPDV.find(i => i.produto_id === id);
            
            if(itemExistente) { itemExistente.quantidade++; } 
            else { carrinhoPDV.push({ produto_id: produto.id, nome: produto.nome, preco: produto.preco_venda, quantidade: 1, observacao: "" }); }
            renderizarCarrinhoPDV();
        }

        function alterarQtd(index, delta) {
            carrinhoPDV[index].quantidade += delta;
            if(carrinhoPDV[index].quantidade <= 0) carrinhoPDV.splice(index, 1);
            renderizarCarrinhoPDV();
        }

        function addObs(index) {
            const obsAtual = carrinhoPDV[index].observacao;
            const novaObs = prompt(`Deseja adicionar observação para: ${carrinhoPDV[index].nome}?`, obsAtual);
            if(novaObs !== null) {
                carrinhoPDV[index].observacao = novaObs;
                renderizarCarrinhoPDV();
            }
        }

        function renderizarCarrinhoPDV() {
            const container = document.getElementById('pdv-carrinho');
            if(carrinhoPDV.length === 0) {
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300"><i class="ph-fill ph-shopping-cart text-6xl mb-2"></i><p class="font-medium text-sm">Carrinho vazio</p></div>`;
                atualizarTotais(); return;
            }

            container.innerHTML = carrinhoPDV.map((item, index) => `
                <div class="bg-white border-b border-slate-100 py-3 flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-slate-800 text-sm leading-tight">${item.nome}</h4>
                            <p class="font-bold text-slate-500 text-xs mt-0.5">R$ ${(item.preco * item.quantidade).toFixed(2).replace('.', ',')}</p>
                        </div>
                        <button onclick="addObs(${index})" class="text-slate-400 hover:text-amber-500 transition-colors bg-slate-50 p-1.5 rounded"><i class="ph-fill ph-chat-teardrop-text text-lg"></i></button>
                    </div>
                    ${item.observacao ? `<p class="text-[10px] text-amber-600 bg-amber-50 px-2 py-1 rounded mb-2 font-semibold inline-block border border-amber-100">⚠️ ${item.observacao}</p>` : ''}
                    <div class="flex items-center justify-between mt-auto">
                        <div class="flex items-center bg-slate-100 rounded-lg p-0.5 border border-slate-200">
                            <button onclick="alterarQtd(${index}, -1)" class="w-8 h-8 bg-white rounded-md shadow-sm font-bold text-slate-600 hover:bg-red-50 hover:text-red-500 transition-colors">-</button>
                            <span class="w-10 text-center font-bold text-sm text-slate-800">${item.quantidade}</span>
                            <button onclick="alterarQtd(${index}, 1)" class="w-8 h-8 bg-white rounded-md shadow-sm font-bold text-slate-600 hover:bg-green-50 hover:text-green-600 transition-colors">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
            atualizarTotais();
        }

        async function buscarClientePDV() {
            const tel = document.getElementById('pdv-tel').value.replace(/\D/g, '');
            const nomeInput = document.getElementById('pdv-nome');
            const painelFid = document.getElementById('painel-fidelidade');

            if(tel.length < 10) return alert("Digite um número válido com DDD.");

            try {
                const res = await fetch(`/api/pdv/cliente/${tel}`);
                if(res.ok) {
                    dadosClienteVip = await res.json();
                    if(dadosClienteVip.bloqueado) {
                        alert("⚠️ BLOQUEADO: Cliente com restrições financeiras ou histórico ruim.");
                        document.getElementById('pdv-status-cliente').className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-700";
                        document.getElementById('pdv-status-cliente').innerText = "BLOQUEADO";
                    } else {
                        document.getElementById('pdv-status-cliente').className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-700";
                        document.getElementById('pdv-status-cliente').innerText = "ATIVO";
                    }
                    nomeInput.value = dadosClienteVip.nome; nomeInput.classList.remove('hidden'); painelFid.classList.remove('hidden');
                    
                    document.getElementById('pdv-pts-disp').innerText = dadosClienteVip.pontos;
                    document.getElementById('pdv-cash-disp').innerText = dadosClienteVip.cashback.toFixed(2).replace('.', ',');
                    document.getElementById('pdv-usar-cash').max = dadosClienteVip.cashback;
                    document.getElementById('pdv-usar-cash').value = 0; document.getElementById('pdv-usar-pontos').checked = false;
                    document.getElementById('pdv-usar-pontos').disabled = dadosClienteVip.pontos < 10;
                } else {
                    dadosClienteVip = null; painelFid.classList.add('hidden'); nomeInput.classList.remove('hidden');
                    nomeInput.value = ""; nomeInput.focus(); alert("Cliente não encontrado! Digite o nome para registrar.");
                }
            } catch(e) { alert("Erro ao comunicar com o servidor."); }
            atualizarTotais();
        }

        function atualizarTotais() {
            let subtotal = carrinhoPDV.reduce((acc, item) => acc + (item.preco * item.quantidade), 0);
            let cashbackUsado = 0; let pontosUsados = false;
            document.getElementById('pdv-subtotal').innerText = `R$ ${subtotal.toFixed(2).replace('.', ',')}`;

            if(dadosClienteVip && carrinhoPDV.length > 0) {
                cashbackUsado = parseFloat(document.getElementById('pdv-usar-cash').value) || 0;
                if(cashbackUsado > dadosClienteVip.cashback) cashbackUsado = dadosClienteVip.cashback;
                if(cashbackUsado > subtotal) cashbackUsado = subtotal; 
                pontosUsados = document.getElementById('pdv-usar-pontos').checked;
            }

            const linhaCash = document.getElementById('linha-desc-cash'); const linhaPts = document.getElementById('linha-desc-pts');
            if(cashbackUsado > 0) { linhaCash.classList.remove('hidden'); document.getElementById('pdv-desc-cash').innerText = `- R$ ${cashbackUsado.toFixed(2).replace('.', ',')}`; } else { linhaCash.classList.add('hidden'); }
            pontosUsados ? linhaPts.classList.remove('hidden') : linhaPts.classList.add('hidden');

            let totalFinal = subtotal - cashbackUsado;
            document.getElementById('pdv-total-final').innerText = `R$ ${totalFinal.toFixed(2).replace('.', ',')}`;
        }

        async function finalizarVendaPDV() {
            if(carrinhoPDV.length === 0) return alert("Carrinho vazio! Adicione lanches primeiro.");
            let telefone = document.getElementById('pdv-tel').value.replace(/\D/g, '') || "BALCAO";
            let nome = document.getElementById('pdv-nome').value || "Consumidor Final";
            let formaPag = document.getElementById('pdv-forma-pag').value;
            let usarCashback = 0; let usarPontos = false;

            if(dadosClienteVip) {
                usarCashback = parseFloat(document.getElementById('pdv-usar-cash').value) || 0;
                usarPontos = document.getElementById('pdv-usar-pontos').checked;
            }

            const payload = {
                nome_cliente: nome, telefone_cliente: telefone, forma_pagamento: formaPag,
                itens: carrinhoPDV.map(i => ({ produto_id: i.produto_id, quantidade: i.quantidade, observacao: i.observacao })),
                usar_saldo_cashback: usarCashback, usar_pontos: usarPontos
            };

            const btn = document.getElementById('btn-finalizar-pdv');
            btn.innerHTML = '<i class="ph ph-spinner animate-spin mr-2"></i> Emitindo...'; btn.disabled = true;

            try {
                const res = await fetch('/api/pedidos/pdv', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                
                if(res.ok) {
                    // IMPRIME AUTOMATICAMENTE E LIMPA A TELA!
                    imprimirCupom(data.pedido_id);
                    carrinhoPDV = []; dadosClienteVip = null;
                    document.getElementById('pdv-tel').value = ""; document.getElementById('pdv-nome').value = "";
                    document.getElementById('pdv-nome').classList.add('hidden'); document.getElementById('painel-fidelidade').classList.add('hidden');
                    document.getElementById('pdv-usar-cash').value = 0; document.getElementById('pdv-usar-pontos').checked = false;
                    renderizarCarrinhoPDV();
                } else { alert(`Erro: ${data.detail}`); }
            } catch(e) { alert("Falha ao comunicar com o servidor."); } 
            finally { btn.innerHTML = '<i class="ph-fill ph-check-circle mr-2 text-2xl"></i> Concluir Venda'; btn.disabled = false; }
        }

        // ==========================
        // GESTÃO DE PEDIDOS (ABA 2)
        // ==========================
        async function carregarListaPedidosPDV() {
            const tbody = document.getElementById('lista-pedidos-pdv');
            tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400"><i class="ph ph-spinner animate-spin text-2xl mb-2 block"></i> Buscando...</td></tr>';
            
            try {
                // Reaproveitamos a rota de logística que já traz os pedidos recentes
                const res = await fetch('/api/logistica/pedidos');
                const data = await res.json();
                
                // Junta os prontos e em rota (Você pode adaptar para buscar todos depois)
                const todos = [...data.prontos, ...data.em_rota].slice(0, 15); // Mostra os 15 mais recentes

                if(todos.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-400 font-medium">Nenhum pedido processado ainda.</td></tr>';
                    return;
                }

                tbody.innerHTML = todos.map(p => {
                    const badgeCor = p.status === 'PRONTO' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700';
                    return `
                    <tr class="hover:bg-slate-50 border-b border-slate-100 transition-colors">
                        <td class="py-4 px-6 font-black text-slate-800">#${p.id}</td>
                        <td class="py-4 px-6 font-semibold text-slate-600">${p.cliente}</td>
                        <td class="py-4 px-6"><span class="bg-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${p.tipo}</span></td>
                        <td class="py-4 px-6 font-black text-brand-500">...</td>
                        <td class="py-4 px-6"><span class="px-2 py-1 rounded text-xs font-bold ${badgeCor}">${p.status.replace(/_/g, ' ')}</span></td>
                        <td class="py-4 px-6 text-center space-x-3">
                            <button onclick="imprimirCupom(${p.id})" class="text-slate-500 hover:text-brand-500 bg-slate-100 p-2 rounded-lg transition-colors border border-slate-200" title="Imprimir Comanda">
                                <i class="ph-fill ph-printer text-xl"></i>
                            </button>
                        </td>
                    </tr>
                `}).join('');
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-red-500 font-bold">Erro ao buscar banco de dados.</td></tr>';
            }
        }

        // ==========================
        // MOTOR DE IMPRESSÃO TÉRMICA (BOBINA 58mm/80mm)
        // ==========================
        async function imprimirCupom(pedidoId) {
            try {
                const res = await fetch(`/api/pedidos/${pedidoId}/recibo`);
                const dados = await res.json();
                if (!res.ok) { alert("Erro ao puxar dados: " + dados.detail); return; }

                let itensHtml = dados.itens.map(i => `
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 2px;">
                        <span style="font-weight: bold;">${i.quantidade}x ${i.nome}</span>
                        <span>R$ ${i.subtotal.toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${i.observacao ? `<div style="font-size: 11px; margin-bottom: 6px; padding-left: 10px; text-transform: uppercase;">-> OBS: ${i.observacao}</div>` : ''}
                `).join('');

                const conteudoCupom = `
                    <html>
                    <head>
                        <title>Comanda #${dados.id}</title>
                        <style>
                            @page { margin: 0; }
                            body { font-family: 'Courier New', Courier, monospace; width: 75mm; margin: 0 auto; padding: 10px; color: #000; background: #fff; }
                            .text-center { text-align: center; }
                            .font-bold { font-weight: bold; }
                            .text-lg { font-size: 20px; }
                            .text-sm { font-size: 13px; }
                            .divisor { border-bottom: 1px dashed #000; margin: 10px 0; }
                        </style>
                    </head>
                    <body>
                        <div class="text-center font-bold text-lg mb-2">ART'S BURGUER</div>
                        <div class="text-center text-sm">Pedido #${dados.id}</div>
                        <div class="text-center text-sm" style="margin-bottom: 10px;">${dados.data_hora}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold">Cliente: ${dados.cliente_nome}</div>
                        <div class="text-sm font-bold">Tel: ${dados.cliente_telefone}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold text-center" style="font-size: 16px;">TIPO: ${dados.tipo}</div>
                        ${dados.tipo === 'DELIVERY' ? `<div class="text-sm" style="margin-top: 5px; text-transform: uppercase;"><b>End:</b> ${dados.endereco}</div>` : ''}
                        <div class="divisor"></div>
                        
                        <div class="font-bold text-center mb-2" style="font-size: 14px;">ITENS DO PEDIDO</div>
                        ${itensHtml}
                        
                        <div class="divisor"></div>
                        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
                            <span>TOTAL PAGO:</span>
                            <span>R$ ${dados.total.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div class="text-sm mt-2" style="text-transform: uppercase;"><b>PAGAMENTO:</b> ${dados.forma_pagamento}</div>
                        <div class="divisor"></div>
                        
                        <div class="text-center text-sm mt-4">Agradecemos a preferencia!</div>
                        <div class="text-center text-sm mt-1" style="margin-bottom: 20px;">.</div>
                    </body>
                    </html>
                `;

                // Mecanismo fantasma para chamar a impressora do sistema operacional
                const janelaImpressao = window.open('', '', 'width=400,height=600');
                janelaImpressao.document.write(conteudoCupom);
                janelaImpressao.document.close();
                janelaImpressao.focus();
                
                setTimeout(() => {
                    janelaImpressao.print();
                    janelaImpressao.close();
                }, 500);

            } catch(e) { alert("Falha na comunicação com a impressora."); console.error(e); }
        }
    </script>
</body>
</html>
