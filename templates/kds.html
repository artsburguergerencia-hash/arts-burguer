<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Cozinha (KDS) - Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        /* Esconde a barra de rolagem mas mantém a função ativa */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen flex flex-col overflow-hidden font-sans select-none">

    <header class="bg-slate-900 border-b border-slate-800 h-16 flex items-center justify-between px-6 shrink-0 shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="bg-red-500/10 p-2 rounded-lg border border-red-500/20">
                <i class="ph-fill ph-fire text-2xl text-red-500 animate-pulse"></i>
            </div>
            <div>
                <h1 class="font-black text-lg tracking-tight uppercase">Monitor de Preparo (KDS)</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest" id="contador-pedidos">0 pedidos em produção</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div id="relogio" class="text-xl font-bold tracking-wider text-slate-400">00:00:00</div>
            <div class="h-4 w-4 bg-green-500 rounded-full border-2 border-slate-950 shadow-[0_0_10px_#22c55e]"></div>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto overflow-y-hidden p-6 flex space-x-6 items-start no-scrollbar bg-gradient-to-b from-slate-950 to-slate-900" id="esteira-pedidos">
        
        <div class="w-full h-full flex flex-col items-center justify-center text-slate-600" id="tela-vazia">
            <i class="ph ph-sparkles text-6xl mb-3 opacity-30"></i>
            <p class="text-lg font-bold tracking-wide">Cozinha Limpa!</p>
            <p class="text-xs opacity-50">Nenhum pedido pendente no momento.</p>
        </div>

    </main>

    <!-- Botão de Ativação do Áudio -->
    <button onclick="ativarSomKDS()" id="btn-som-kds" class="fixed bottom-6 right-6 bg-slate-800 hover:bg-slate-700 text-white px-5 py-3 rounded-full shadow-2xl z-50 flex items-center text-sm font-black tracking-wider uppercase transition-all duration-300 border border-slate-700 active:scale-95">
        <i class="ph-fill ph-speaker-slash mr-2 text-xl text-red-400" id="icone-som-kds"></i> Ativar Alarme
    </button>

    <script>
        // === CONTROLE DO ALARME SONORO ===
        let somAtivado = false;
        let listaPedidosAnteriores = [];
        // Um som clássico de notificação
        const somNotificacao = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');

        function ativarSomKDS() {
            somAtivado = true;
            // O navegador exige que o usuário interaja com a tela antes de tocar sons automáticos
            somNotificacao.play().then(() => {
                somNotificacao.pause(); 
                somNotificacao.currentTime = 0;
            }).catch(e => console.log("Áudio liberado"));
            
            // Esconde o botão após ativado
            document.getElementById('btn-som-kds').classList.add('hidden');
        }

        // Atualiza o relógio do painel a cada segundo
        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // Dispara a busca de novos pedidos na cozinha a cada 3 segundos
        setInterval(buscarPedidosCozinha, 3000);
        document.addEventListener('DOMContentLoaded', buscarPedidosCozinha);

        async function buscarPedidosCozinha() {
            try {
                const response = await fetch('/api/kds/pedidos');
                const pedidos = await response.json();
                
                const esteira = document.getElementById('esteira-pedidos');
                const contador = document.getElementById('contador-pedidos');
                
                contador.innerText = `${pedidos.length} ${pedidos.length === 1 ? 'pedido' : 'pedidos'} em produção`;

                // LÓGICA DO ALARME
                const temPedidoNovo = pedidos.some(p => p.status === 'RECEBIDO' && !listaPedidosAnteriores.includes(p.id));
                if (temPedidoNovo && somAtivado) {
                    somNotificacao.play();
                }
                listaPedidosAnteriores = pedidos.map(p => p.id);

                if (pedidos.length === 0) {
                    esteira.innerHTML = `
                        <div class="w-full h-full flex flex-col items-center justify-center text-slate-600" id="tela-vazia">
                            <i class="ph ph-sparkles text-6xl mb-3 opacity-30"></i>
                            <p class="text-lg font-bold tracking-wide">Cozinha Limpa!</p>
                            <p class="text-xs opacity-50">Nenhum pedido pendente no momento.</p>
                        </div>`;
                    return;
                }

                esteira.innerHTML = pedidos.map(p => {
                    const statusRecebido = p.status === 'RECEBIDO';
                    
                    const badgeTipoClass = p.tipo === 'DELIVERY' ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-blue-500/10 text-blue-400 border-blue-500/20';
                    const cardBorderClass = statusRecebido ? 'border-red-500/30 ring-1 ring-red-500/10' : 'border-blue-500/30';
                    const btnClass = statusRecebido 
                        ? 'bg-red-600 hover:bg-red-500 shadow-[0_4px_12px_rgba(239,68,68,0.2)]' 
                        : 'bg-blue-600 hover:bg-blue-500 shadow-[0_4px_12px_rgba(59,130,246,0.2)]';
                    
                    const btnTexto = statusRecebido ? 'COMEÇAR PREPARO' : 'MARCAR COMO PRONTO';
                    const novoStatus = statusRecebido ? 'EM_PREPARO' : 'PRONTO';

                    return `
                        <div class="w-80 bg-slate-900 border ${cardBorderClass} rounded-2xl flex flex-col max-h-full shrink-0 shadow-2xl overflow-hidden transition-all duration-300">
                            
                            <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-start">
                                <div>
                                    <h3 class="text-2xl font-black text-white tracking-tight">#${p.id}</h3>
                                    <span class="px-2 py-0.5 rounded-md text-[10px] font-bold border ${badgeTipoClass} uppercase mt-1 inline-block">${p.tipo}</span>
                                </div>
                                <div class="flex flex-col items-end space-y-2">
                                    <span class="text-xs font-black px-2 py-1 rounded bg-slate-800 tracking-wide ${statusRecebido ? 'text-red-400 animate-pulse' : 'text-blue-400'}">
                                        ${statusRecebido ? 'NOVO' : 'NA CHAPA'}
                                    </span>
                                    <!-- AQUI ESTÁ O BOTÃO DE IMPRIMIR! -->
                                    <button onclick="imprimirCupom(${p.id})" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1 rounded flex items-center text-[10px] font-bold uppercase transition-colors border border-slate-700 shadow-sm active:scale-95">
                                        <i class="ph-fill ph-printer mr-1 text-sm"></i> Imprimir
                                    </button>
                                </div>
                            </div>

                            <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar min-h-[150px]">
                                ${p.itens.map(item => `
                                    <div class="border-b border-slate-800/40 pb-2 last:border-0 last:pb-0">
                                        <div class="flex items-start">
                                            <span class="font-black text-xl text-red-500 mr-3 shrink-0 bg-red-500/5 border border-red-500/10 px-2 py-0.5 rounded-lg">${item.quantidade}x</span>
                                            <div class="flex-1">
                                                <h4 class="font-extrabold text-slate-200 tracking-tight text-base leading-tight uppercase">${item.nome_produto}</h4>
                                                ${item.observacao ? `
                                                    <p class="text-xs font-semibold text-amber-400 mt-1 bg-amber-500/5 border border-amber-500/10 px-2 py-1 rounded">
                                                        ⚠️ OBS: ${item.observacao}
                                                    </p>
                                                ` : ''}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="p-3 bg-slate-900/80 border-t border-slate-800">
                                <button onclick="mudarStatusPedido(${p.id}, '${novoStatus}')" class="w-full ${btnClass} text-white font-black py-3.5 rounded-xl text-xs tracking-wider uppercase transition-all duration-150 active:scale-[0.98]">
                                    ${btnTexto}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error("Erro ao carregar KDS:", error);
            }
        }

        async function mudarStatusPedido(id, status) {
            try {
                if(status === 'PRONTO') {}

                const response = await fetch(`/api/kds/pedidos/${id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: status })
                });

                if (response.ok) {
                    buscarPedidosCozinha();
                } else {
                    alert("Erro ao atualizar o status do pedido.");
                }
            } catch (error) {
                console.error("Erro ao mudar status:", error);
            }
        }

        // ==========================
        // MOTOR DE IMPRESSÃO TÉRMICA
        // ==========================
        async function imprimirCupom(pedidoId) {
            try {
                const res = await fetch(`/api/pedidos/${pedidoId}/recibo`);
                const dados = await res.json();
                
                if (!res.ok) { alert("Erro: " + dados.detail); return; }

                let itensHtml = dados.itens.map(i => `
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 2px;">
                        <span style="font-weight: bold;">${i.quantidade}x ${i.nome}</span>
                        <span>R$ ${i.subtotal.toFixed(2).replace('.', ',')}</span>
                    </div>
                    ${i.observacao ? `<div style="font-size: 11px; margin-bottom: 6px; padding-left: 10px; text-transform: uppercase;">-> OBS: ${i.observacao}</div>` : ''}
                `).join('');

                const conteudoCupom = `
                    <html>
                    <head>
                        <title>Comanda #${dados.id}</title>
                        <style>
                            @page { margin: 0; }
                            body { font-family: 'Courier New', Courier, monospace; width: 75mm; margin: 0 auto; padding: 10px; color: #000; background: #fff; }
                            .text-center { text-align: center; }
                            .font-bold { font-weight: bold; }
                            .text-lg { font-size: 20px; }
                            .text-sm { font-size: 13px; }
                            .divisor { border-bottom: 1px dashed #000; margin: 10px 0; }
                        </style>
                    </head>
                    <body>
                        <div class="text-center font-bold text-lg mb-2">ART'S BURGUER</div>
                        <div class="text-center text-sm">Pedido #${dados.id}</div>
                        <div class="text-center text-sm" style="margin-bottom: 10px;">${dados.data_hora}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold">Cliente: ${dados.cliente_nome}</div>
                        <div class="text-sm font-bold">Tel: ${dados.cliente_telefone}</div>
                        
                        <div class="divisor"></div>
                        <div class="text-sm font-bold text-center" style="font-size: 16px;">TIPO: ${dados.tipo}</div>
                        ${dados.tipo === 'DELIVERY' ? `<div class="text-sm" style="margin-top: 5px; text-transform: uppercase;"><b>End:</b> ${dados.endereco}</div>` : ''}
                        <div class="divisor"></div>
                        
                        <div class="font-bold text-center mb-2" style="font-size: 14px;">ITENS DO PEDIDO</div>
                        ${itensHtml}
                        
                        <div class="divisor"></div>
                        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
                            <span>TOTAL:</span>
                            <span>R$ ${dados.total.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <div class="text-sm mt-2" style="text-transform: uppercase;"><b>PAGAMENTO:</b> ${dados.forma_pagamento}</div>
                        <div class="divisor"></div>
                        
                        <div class="text-center text-sm mt-4">Obrigado pela preferencia!</div>
                        <div class="text-center text-sm mt-1" style="margin-bottom: 20px;">.</div>
                    </body>
                    </html>
                `;

                const janelaImpressao = window.open('', '', 'width=400,height=600');
                janelaImpressao.document.write(conteudoCupom);
                janelaImpressao.document.close();
                janelaImpressao.focus();
                
                setTimeout(() => {
                    janelaImpressao.print();
                    janelaImpressao.close();
                }, 500);

            } catch(e) {
                alert("Falha de conexão com a impressora.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
