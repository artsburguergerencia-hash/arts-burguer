<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDS - Cozinha | Art's Burguer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-white h-screen w-screen flex flex-col overflow-hidden font-sans">

    <!-- CABEÇALHO KDS -->
    <header class="bg-black/50 border-b border-slate-800 h-16 flex items-center justify-between px-6 shrink-0 z-20">
        <div class="flex items-center space-x-3">
            <i class="ph-fill ph-cooking-pot text-3xl text-brand-500 text-red-500 animate-pulse"></i>
            <div>
                <h1 class="font-black text-lg tracking-tight uppercase leading-none">Monitor KDS</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Gestão de Cozinha</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="buscarPedidosKDS()" class="text-slate-400 hover:text-white transition-colors bg-slate-800 px-4 py-2 rounded-lg text-sm font-bold flex items-center">
                <i class="ph ph-arrows-clockwise mr-2 text-lg"></i> Atualizar
            </button>
        </div>
    </header>

    <!-- ÁREA DE COLUNAS (CORRIGIDO PARA NÃO VAZAR DA TELA) -->
    <main class="flex-1 overflow-hidden p-4 md:p-6 flex flex-col md:flex-row gap-4 md:gap-6">
        
        <!-- COLUNA 1: NOVOS PEDIDOS (RECEBIDOS) -->
        <section class="flex-1 flex flex-col bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
            <header class="p-3 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                <h2 class="font-black text-white flex items-center text-lg"><i class="ph-fill ph-bell-ringing mr-2 text-amber-500"></i> Fila de Preparo</h2>
                <span id="badge-recebidos" class="bg-amber-500 text-black font-black px-2 py-0.5 rounded text-xs">0</span>
            </header>
            <div class="flex-1 overflow-y-auto p-4 no-scrollbar bg-slate-800/50">
                <!-- GRID RESPONSIVO PARA OS CARDS (Quebra a linha automático) -->
                <div id="lista-recebidos" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-max">
                    <p class="text-slate-500 col-span-full text-center py-10">Buscando comandas...</p>
                </div>
            </div>
        </section>

        <!-- COLUNA 2: EM PREPARO (CHAPA) -->
        <section class="flex-1 flex flex-col bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-xl">
            <header class="p-3 border-b border-slate-700 bg-slate-900/50 flex justify-between items-center">
                <h2 class="font-black text-white flex items-center text-lg"><i class="ph-fill ph-fire mr-2 text-red-500"></i> Na Chapa</h2>
                <span id="badge-preparo" class="bg-red-500 text-white font-black px-2 py-0.5 rounded text-xs">0</span>
            </header>
            <div class="flex-1 overflow-y-auto p-4 no-scrollbar bg-slate-800/50">
                <!-- GRID RESPONSIVO PARA OS CARDS -->
                <div id="lista-preparo" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 auto-rows-max">
                </div>
            </div>
        </section>
    </main>

    <!-- IFRAME INVISÍVEL PARA IMPRESSÃO TÉRMICA 80MM -->
    <iframe id="iframe-impressao" style="display:none;"></iframe>

    <script>
        async function buscarPedidosKDS() {
            try {
                const res = await fetch('/api/kds/pedidos');
                const pedidos = await res.json();
                
                const recebidos = pedidos.filter(p => p.status === 'RECEBIDO');
                const emPreparo = pedidos.filter(p => p.status === 'EM_PREPARO');
                
                document.getElementById('badge-recebidos').innerText = recebidos.length;
                document.getElementById('badge-preparo').innerText = emPreparo.length;

                renderizarColuna('lista-recebidos', recebidos, 'EM_PREPARO', 'Jogar na Chapa', 'bg-red-600 hover:bg-red-500');
                renderizarColuna('lista-preparo', emPreparo, 'PRONTO', 'Pedido Pronto!', 'bg-green-600 hover:bg-green-500');
            } catch(e) { console.log(e); }
        }

        function renderizarColuna(idElemento, lista, proximoStatus, textoBotao, corBotao) {
            const div = document.getElementById(idElemento);
            if(lista.length === 0) {
                div.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-10 text-slate-600"><i class="ph-fill ph-check-circle text-5xl mb-2"></i><p>Fila limpa!</p></div>`;
                return;
            }

            div.innerHTML = lista.map(p => {
                const itensHtml = p.itens.map(i => `
                    <div class="border-b border-slate-700 pb-2 mb-2 last:border-0 last:mb-0 last:pb-0">
                        <p class="font-bold text-sm leading-tight text-white"><span class="text-amber-500 mr-1">${i.quantidade}x</span> ${i.nome_produto}</p>
                        ${i.observacao ? `<p class="text-[11px] text-amber-200 bg-amber-900/30 p-1.5 rounded mt-1 border border-amber-700/50 uppercase tracking-wider font-bold">⚠️ ${i.observacao}</p>` : ''}
                    </div>
                `).join('');

                return `
                    <div class="bg-slate-700 rounded-xl p-3 shadow-lg border-l-4 ${p.tipo === 'DELIVERY' ? 'border-blue-500' : 'border-purple-500'} flex flex-col h-full">
                        <div class="flex justify-between items-start mb-3 shrink-0">
                            <div>
                                <h3 class="font-black text-xl leading-none tracking-tight">#${p.id}</h3>
                                <p class="text-[10px] font-bold uppercase tracking-widest ${p.tipo === 'DELIVERY' ? 'text-blue-400' : 'text-purple-400'} mt-1">${p.tipo}</p>
                            </div>
                            <button onclick="imprimirComanda(${p.id})" class="bg-slate-800 hover:bg-slate-600 text-slate-300 p-2 rounded-lg transition-colors" title="Imprimir Comanda">
                                <i class="ph ph-printer text-lg"></i>
                            </button>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-lg mb-3 flex-1">
                            ${itensHtml}
                        </div>
                        <button onclick="mudarStatus(${p.id}, '${proximoStatus}')" class="w-full ${corBotao} text-white font-black uppercase tracking-wider text-xs py-3 rounded-lg transition-all active:scale-95 shadow-md shrink-0">
                            ${textoBotao}
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function mudarStatus(id, novoStatus) {
            try {
                await fetch(`/api/kds/pedidos/${id}/status`, {
                    method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: novoStatus})
                });
                buscarPedidosKDS();
            } catch(e) {}
        }

        // MOTOR DE IMPRESSÃO 80MM TÉRMICA CORRIGIDO
        async function imprimirComanda(pedido_id) {
            try {
                const res = await fetch(`/api/pedidos/${pedido_id}/recibo`);
                const dados = await res.json();
                
                const frame = document.getElementById('iframe-impressao');
                const doc = frame.contentWindow.document;
                
                // CSS específico para bobinas de 80mm
                const conteudoHtml = `
                    <html>
                    <head>
                        <style>
                            @page { margin: 0; size: 80mm auto; }
                            body { font-family: 'Courier New', Courier, monospace; width: 72mm; margin: 0 auto; padding: 5mm 0; color: #000; font-size: 12px; }
                            h1 { font-size: 18px; text-align: center; margin: 0 0 5px 0; text-transform: uppercase; }
                            .center { text-align: center; }
                            .divider { border-top: 1px dashed #000; margin: 8px 0; }
                            .item { margin-bottom: 6px; }
                            .item-nome { font-weight: bold; font-size: 14px; }
                            .obs { font-size: 11px; font-weight: bold; margin-left: 10px; text-transform: uppercase; }
                        </style>
                    </head>
                    <body>
                        <h1>ART'S BURGUER</h1>
                        <div class="center">PEDIDO #${dados.id} - ${dados.tipo}</div>
                        <div class="center" style="font-size:10px;">${dados.data_hora}</div>
                        <div class="divider"></div>
                        <div style="font-weight:bold;">Cliente: ${dados.cliente_nome}</div>
                        ${dados.tipo === 'DELIVERY' ? `<div>Endereço: ${dados.endereco}</div>` : ''}
                        <div class="divider"></div>
                        ${dados.itens.map(i => `
                            <div class="item">
                                <span class="item-nome">${i.quantidade}x ${i.nome}</span>
                                ${i.observacao ? `<div class="obs">⚠️ ${i.observacao}</div>` : ''}
                            </div>
                        `).join('')}
                        <div class="divider"></div>
                        <div class="center" style="margin-top:15px; font-size:10px;">Cozinha KDS</div>
                    </body>
                    </html>
                `;
                
                doc.open();
                doc.write(conteudoHtml);
                doc.close();
                
                // Aguarda o Iframe carregar e chama a impressão nativa
                setTimeout(() => {
                    frame.contentWindow.focus();
                    frame.contentWindow.print();
                }, 500);

            } catch (e) {
                alert("Erro ao buscar dados para impressão.");
            }
        }

        setInterval(buscarPedidosKDS, 5000);
        document.addEventListener('DOMContentLoaded', buscarPedidosKDS);
    </script>
</body>
</html>
